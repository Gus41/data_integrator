{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DataFlow{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  {% block extra_style %}{% endblock %}
</head>
<body class="bg-stone-100 text-stone-900 min-h-screen font-sans antialiased">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-stone-200 flex items-center px-8 h-12 sticky top-0 z-50">
    <a href="{% url 'home' %}" class="font-mono text-sm font-medium tracking-tight">
      data<span class="text-stone-400">/</span>flow
    </a>
    <div class="flex gap-1 ml-auto">
      <a href="{% url 'home' %}"
         class="text-sm px-3 py-1.5 rounded-lg transition-colors {% block nav_home %}text-stone-500 hover:text-stone-900 hover:bg-stone-100{% endblock %}">
        Integrações
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-4xl mx-auto px-6 py-10">

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm
          {% if message.tags == 'success' %}bg-green-50 text-green-800
          {% elif message.tags == 'error' %}bg-red-50 text-red-700
          {% else %}bg-blue-50 text-blue-800{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
